<template name="app">
  <div class="app-container">
    <header>
      <div class="app-header">
        <h1>Task Manager</h1>
      </div>
    </header>

    <div class="main-content">
      <ul id="tasks-list" class="tasks-list">
        {{#each tasks}}
          {{> Task}}
        {{/each}}
      </ul>
    </div>
  </div>
</template>
