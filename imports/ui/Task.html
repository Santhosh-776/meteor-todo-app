<template name="Task">
  <li class="task-item {{#if checked}}checked{{/if}}">
    <div class="task-content">
      <label class="checkbox-container">
        <input
          type="checkbox"
          checked="{{checked}}"
          class="toggle-checked"
        />
        <span class="checkmark"></span>
      </label>
      <span class="text">{{text}}</span>
    </div>
  </li>
</template>
